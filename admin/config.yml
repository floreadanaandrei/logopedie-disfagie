backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: ro

collections:
  - name: "blog"
    label: "Blog"
    files:
      - label: "Articole"
        name: "posts"
        file: "data/posts.json"
        fields:
          - name: "posts"
            label: "Lista articole"
            widget: "list"
            label_singular: "Articol"
            fields:
              - { label: "Titlu", name: "title", widget: "string" }
              - { label: "Data publicării", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
              - { label: "Autor", name: "author", widget: "select", options: ["Mihaela Fotescu Zamfir", "Specialist 2", "Specialist 3"] }
              - { label: "Categorie", name: "category", widget: "select", options: ["Disfagie", "Evaluare", "Tratament", "Noutăți", "Sfaturi"] }
              - { label: "Rezumat scurt", name: "excerpt", widget: "text", hint: "Maxim 2-3 propoziții afișate în lista de articole" }
              - { label: "Imagine articol", name: "image", widget: "image", required: false }
              - { label: "Conținut articol", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Setări Site"
    files:
      - label: "Specialiști"
        name: "team"
        file: "data/team.json"
        fields:
          - name: "specialists"
            label: "Lista Specialiști"
            widget: "list"
            fields:
              - { label: "Nume complet", name: "name", widget: "string" }
              - { label: "Titlu / Specializare", name: "title", widget: "string" }
              - { label: "Telefon", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Descriere scurtă", name: "bio", widget: "text" }
              - { label: "Fotografie", name: "photo", widget: "image", required: false }
              - label: "Etichete specializări"
                name: "tags"
                widget: "list"
                hint: "Ex: Disfagie, Neurologie, Pediatrie"
                field: { label: "Etichetă", name: "tag", widget: "string" }
              - label: "Specializări (listă detaliată)"
                name: "specializari"
                widget: "list"
                hint: "Apare în panoul extins al specialistului"
                field: { label: "Specializare", name: "item", widget: "string" }
              - label: "Afilieri profesionale"
                name: "afilieri"
                widget: "list"
                hint: "Ex: Asociația Română de Foniatrie"
                field: { label: "Afiliere", name: "item", widget: "string" }

      - label: "Conținut Site"
        name: "site"
        file: "data/site.json"
        fields:
          - label: "Secțiunea Hero (prima pagină)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Text mic deasupra titlului", name: "badge", widget: "string" }
              - { label: "Titlu principal", name: "titlu", widget: "string" }
              - { label: "Descriere", name: "descriere", widget: "text" }
              - { label: "Buton Programare (text)", name: "btn_programare", widget: "string" }
              - { label: "Buton Echipă (text)", name: "btn_echipa", widget: "string" }
          - label: "Secțiunea Despre Disfagie"
            name: "disfagie"
            widget: "object"
            fields:
              - { label: "Titlu", name: "titlu", widget: "string" }
              - { label: "Descriere", name: "descriere", widget: "text" }
          - label: "Secțiunea Echipa Noastră"
            name: "echipa"
            widget: "object"
            fields:
              - { label: "Titlu", name: "titlu", widget: "string" }
              - { label: "Descriere", name: "descriere", widget: "text" }
          - label: "Secțiunea Ce Oferim"
            name: "servicii"
            widget: "object"
            fields:
              - { label: "Titlu", name: "titlu", widget: "string" }
              - { label: "Descriere", name: "descriere", widget: "text" }
              - label: "Servicii"
                name: "lista"
                widget: "list"
                fields:
                  - { label: "Titlu serviciu", name: "titlu", widget: "string" }
                  - { label: "Descriere serviciu", name: "descriere", widget: "text" }
          - label: "Secțiunea Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Titlu", name: "titlu", widget: "string" }
              - { label: "Text intro", name: "intro", widget: "text" }
